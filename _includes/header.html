<header class="site-header">
    <a class="site-brand" href="{{ site.baseurl }}/" aria-label="{{ site.title }}, home">
        <span class="site-mark" aria-hidden="true">J</span>
        <span class="site-name">Jibran’s <em>Perspective</em></span>
    </a>
    <nav class="site-nav" aria-label="Primary navigation">
        <a{% if page.url == "/" %} class="active" aria-current="page"{% endif %} href="{{ site.baseurl }}/">Writing</a>
        {% for link in site.links %}
        <a{% if page.url == link[1] %} class="active" aria-current="page"{% endif %} href="{{ site.baseurl }}{{ link[1] }}">{{ link[0] }}</a>
        {% endfor %}
        {% for link in site.special_links %}
        <a href="{{ link[1] }}">{{ link[0] }}</a>
        {% endfor %}
    </nav>
</header>
