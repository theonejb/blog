<!doctype html>
<html lang="en" dir="ltr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="X-UA-Compatible" content="ie=edge" />
        <meta name="theme-color" content="#f7f5ef" />
        <title>{% if page.url == "/" %}{{ site.title }}{% else %}{{ page.title }} | {{ site.title }}{% endif %}</title>
        <meta
            name="description"
            content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}"
        />
        <link
            href="{{ site.baseurl }}/feed.xml"
            rel="alternate"
            type="application/atom+xml"
        />
        <link rel="canonical" href="{{ site.baseurl }}{{ page.url }}" />
        <link rel="stylesheet" href="{{ site.baseurl }}/assets/style.css" />

        {% if jekyll.environment == "production" %}
        <!-- Privacy-friendly analytics by Plausible -->
        <script async src="https://plausible.io/js/pa-A8CpgqnLou2S7kFjfiK3s.js"></script>
        <script>
          window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
          plausible.init()
        </script>
        {% endif %}
    </head>
    <body class="layout-{{ page.layout }}">
        <a class="skip-link" href="#content">Skip to content</a>
